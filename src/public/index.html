<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FckSWS - QR Sync</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.svg">
  <link rel="mask-icon" href="/favicon.svg" color="#4c4f69">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cereal:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'airbnb': ['Cereal', 'Circular', '-apple-system', 'BlinkMacSystemFont', 'Roboto', 'Helvetica Neue', 'sans-serif'],
          },
          colors: {
            ctp: {
              base: '#eff1f5',
              mantle: '#e6e9ef',
              crust: '#dce0e8',
              text: '#4c4f69',
              subtext: '#5c5f77',
              lavender: '#7287fd',
              blue: '#1e66f5',
              sapphire: '#209fb5',
              sky: '#04a5e5',
              teal: '#179299',
              green: '#40a02b',
              mauve: '#8839ef',
              pink: '#ea76cb',
              rosewater: '#dc8a78'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #ffffff;
      font-family: 'Cereal', 'Circular', -apple-system, BlinkMacSystemFont, 'Roboto', 'Helvetica Neue', sans-serif;
      overflow: hidden;
      position: relative;
    }
    
    /* Background ripple animation */
    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(45deg, rgba(59, 130, 246, 0.03), rgba(139, 92, 246, 0.03), rgba(236, 72, 153, 0.03));
      animation: ripple-expand 6s infinite ease-out;
    }
    
    .ripple:nth-child(1) {
      width: 300px;
      height: 300px;
      top: 50%;
      left: 50%;
      margin-top: -150px;
      margin-left: -150px;
      animation-delay: -2s;
    }
    
    .ripple:nth-child(2) {
      width: 600px;
      height: 600px;
      top: 50%;
      left: 50%;
      margin-top: -300px;
      margin-left: -300px;
      animation-delay: -4s;
    }
    
    .ripple:nth-child(3) {
      width: 900px;
      height: 900px;
      top: 50%;
      left: 50%;
      margin-top: -450px;
      margin-left: -450px;
      animation-delay: -1s;
    }
    
    .ripple:nth-child(4) {
      width: 1200px;
      height: 1200px;
      top: 50%;
      left: 50%;
      margin-top: -600px;
      margin-left: -600px;
      animation-delay: -3s;
    }
    
    @keyframes ripple-expand {
      0% {
        transform: scale(0);
        opacity: 0.8;
      }
      50% {
        opacity: 0.3;
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }
    
    /* Vibrant title styling */
    .vibrant-title {
      background: linear-gradient(45deg, #3b82f6, #ef4444, #f97316, #8b5cf6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 8s ease-in-out infinite;
      position: relative;
    }
    
    @keyframes gradient-shift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
    
    /* Breathing effect for title */
    .title-container {
      animation: breathe 4s ease-in-out infinite;
    }
    
    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.02);
      }
    }
    
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    .animate-pulse-subtle {
      animation: pulse-subtle 2s ease-in-out infinite;
    }
    #qrCanvas {
      display: none;
    }
    #qrcode {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrcode canvas {
      border-radius: 8px;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }
    
    /* Video morphing effect */
    .video-container {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border-radius: 16px; /* Initial state: rounded-2xl */
    }
    
    /* INTRO ANIMATION - Ne pas toucher, fonctionne parfaitement */
    .video-morphed {
      border-radius: 50%;
      transform: scale(1);
    }
    
    .video-morphed video {
      border-radius: 50%;
      transition: border-radius 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .video-morphed canvas {
      border-radius: 50%;
      transition: border-radius 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .video-morphed::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: inherit;
      box-shadow: 0 0 0 rgba(64, 160, 43, 0);
      animation: qr-glow-intro 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 qr-detected-pulse 2s ease-in-out infinite 0.8s;
      pointer-events: none;
      z-index: 1;
    }
    
    /* OUTRO ANIMATION - Séparée et indépendante */
    .video-morphing-out {
      animation: morph-circle-to-square 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    .video-morphing-out video {
      animation: morph-circle-to-square 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    .video-morphing-out canvas {
      animation: morph-circle-to-square 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    .video-morphing-out::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      animation: qr-glow-outro 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
      z-index: 1;
    }
    
    /* Keyframes pour INTRO */
    @keyframes qr-glow-intro {
      0% {
        box-shadow: 0 0 0 rgba(64, 160, 43, 0);
      }
      100% {
        box-shadow: 0 0 40px rgba(64, 160, 43, 0.4), 0 0 80px rgba(64, 160, 43, 0.2);
      }
    }
    
    /* Keyframes pour OUTRO */
    @keyframes morph-circle-to-square {
      0% {
        border-radius: 50%;
      }
      100% {
        border-radius: 16px;
      }
    }
    
    @keyframes qr-glow-outro {
      0% {
        border-radius: 50%;
        box-shadow: 0 0 40px rgba(64, 160, 43, 0.4), 0 0 80px rgba(64, 160, 43, 0.2);
      }
      100% {
        border-radius: 16px;
        box-shadow: 0 0 0 rgba(64, 160, 43, 0);
      }
    }
    
    /* Pulsation continue */
    @keyframes qr-detected-pulse {
      0%, 100% {
        box-shadow: 0 0 40px rgba(64, 160, 43, 0.4), 0 0 80px rgba(64, 160, 43, 0.2);
      }
      50% {
        box-shadow: 0 0 60px rgba(64, 160, 43, 0.6), 0 0 120px rgba(64, 160, 43, 0.4);
      }
    }
    
    @keyframes qr-detected-pulse {
      0%, 100% {
        box-shadow: 0 0 40px rgba(64, 160, 43, 0.4), 0 0 80px rgba(64, 160, 43, 0.2);
      }
      50% {
        box-shadow: 0 0 60px rgba(64, 160, 43, 0.6), 0 0 120px rgba(64, 160, 43, 0.4);
      }
    }
    
    /* Button hover effects */
    .btn-primary {
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
      left: 100%;
    }
    
    /* Scan line effect for scanner button */
    .btn-scanner {
      position: relative;
      overflow: hidden;
    }
    
    .btn-scanner::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, 
        transparent 0%, 
        #10b981 20%, 
        #34d399 50%, 
        #10b981 80%, 
        transparent 100%
      );
      box-shadow: 0 0 15px #10b981, 0 0 25px #10b981;
      animation: none;
      transition: left 0.6s ease-in-out;
    }
    
    .btn-scanner:hover::after {
      left: 100%;
      animation: scanner-glow 0.6s ease-in-out;
    }
    
    @keyframes scanner-glow {
      0% {
        box-shadow: 0 0 5px #10b981;
        opacity: 0.8;
      }
      50% {
        box-shadow: 0 0 20px #10b981, 0 0 30px #34d399;
        opacity: 1;
      }
      100% {
        box-shadow: 0 0 10px #10b981;
        opacity: 0.8;
      }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md relative z-10">
    <!-- Background ripple animation -->
    <div class="ripple-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>
    
    <!-- Container -->
    <div class="p-8 animate-fade-in">
      <!-- Header -->
      <div class="text-center mb-12 title-container">
        <h1 class="text-8xl font-bold font-airbnb vibrant-title">
          Fcksws
        </h1>
      </div>
      
      <!-- Step 1: Mode selection -->
      <div id="step1" class="step active">
        <div class="space-y-4">
          <button onclick="selectMode('scanner')" class="btn-scanner w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-3 text-lg font-airbnb shadow-lg hover:shadow-xl">
            <span class="text-2xl">📷</span>
            <span>Scanner un QR code</span>
          </button>
          <button onclick="selectMode('receiver')" class="w-full bg-white hover:bg-gray-50 text-blue-600 font-medium py-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-3 text-lg border-2 border-blue-600 font-airbnb shadow-lg hover:shadow-xl">
            <span class="text-2xl">📱</span>
            <span>Recevoir le QR code</span>
          </button>
        </div>
      </div>
      
      <!-- Step 2: Create room (for scanner) -->
      <div id="step2-create" class="step">
        <h2 class="text-xl font-semibold text-ctp-text mb-4 text-center">Créer une room</h2>
        <div class="mb-6">
          <label class="block text-ctp-subtext text-sm font-medium mb-2">Nom de votre room</label>
          <input type="text" id="roomNameInput" placeholder="Ex: Amphi A, CM Maths..." 
            class="w-full px-4 py-3 rounded-xl border-2 border-ctp-crust bg-white text-ctp-text text-base focus:outline-none focus:border-ctp-text transition-colors"
            maxlength="30" />
        </div>
        <button onclick="createRoom()" class="w-full bg-ctp-text hover:bg-ctp-subtext text-white font-medium py-3 rounded-xl transition-all duration-200 mb-3">
          Créer et scanner
        </button>
        <button onclick="goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
      
      <!-- Step 2: Join room (for receiver) -->
      <div id="step2-join" class="step">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold text-ctp-text">Rooms disponibles</h2>
          <span class="text-xs text-ctp-subtext flex items-center gap-1">
            <span class="inline-block w-2 h-2 bg-ctp-green rounded-full animate-pulse"></span>
            Auto-refresh
          </span>
        </div>
        <div id="roomsList" class="space-y-2 mb-4 max-h-96 overflow-y-auto">
          <div class="text-center py-8 text-ctp-subtext text-sm">
            Chargement...
          </div>
        </div>
        <button onclick="refreshRooms()" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200 mb-3">
          🔄 Actualiser maintenant
        </button>
        <button onclick="goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
      
      <!-- Step 3: Scanner mode -->
      <div id="step3-scanner" class="step">
        <div class="mb-4 bg-ctp-mantle/50 rounded-xl p-4 text-center">
          <p class="text-ctp-subtext text-sm mb-1">Room active</p>
          <p id="roomName" class="text-2xl font-bold text-ctp-text"></p>
        </div>
        
        <h2 class="text-lg font-semibold text-ctp-text mb-3 text-center flex items-center justify-center gap-2">
          <span class="text-xl">📷</span> Scannez le QR code
        </h2>
        <div class="relative mb-4">
          <div id="videoContainer" class="video-container rounded-2xl">
            <video id="video" autoplay playsinline class="w-full rounded-2xl shadow-lg" style="display: none;"></video>
            <canvas id="overlayCanvas" class="absolute top-0 left-0 w-full h-full rounded-2xl pointer-events-none" style="display: none;"></canvas>
          </div>
          
          <!-- Zoom controls -->
          <div id="zoomControls" class="absolute bottom-4 right-4 flex gap-2" style="display: none;">
            <button onclick="adjustZoom(-1)" class="bg-black/50 hover:bg-black/70 text-white w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 text-xl font-bold">
              −
            </button>
            <div class="bg-black/50 text-white px-3 py-2 rounded-full backdrop-blur-sm flex items-center justify-center min-w-[60px]">
              <span id="zoomLevel" class="text-sm font-mono">1.0x</span>
            </div>
            <button onclick="adjustZoom(1)" class="bg-black/50 hover:bg-black/70 text-white w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 text-xl font-bold">
              +
            </button>
          </div>
        </div>
        <canvas id="qrCanvas" style="display: none;"></canvas>
        <div id="scanStatus" class="text-center py-3 px-4 rounded-xl mb-4 bg-ctp-mantle text-ctp-subtext text-sm animate-pulse-subtle">
          En attente de QR code...
        </div>
        <button onclick="stopScanner(); goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
      
      <!-- Step 3: Receiver mode -->
      <div id="step3-receiver" class="step">
        <div class="mb-4 bg-ctp-mantle/50 rounded-xl p-4 text-center">
          <p class="text-ctp-subtext text-sm mb-1">Room connectée</p>
          <p id="roomNameDisplay" class="text-2xl font-bold text-ctp-text"></p>
        </div>
        
        <h2 id="receiverTitle" class="text-lg font-semibold text-ctp-text mb-3 text-center flex items-center justify-center gap-2">
          <span class="text-xl">⏳</span> En attente du QR code
        </h2>
        <div id="qrDisplay" class="bg-white rounded-2xl p-6 mb-4 shadow-inner hidden flex items-center justify-center min-h-[300px]"></div>
        <div id="receiveStatus" class="text-center py-3 px-4 rounded-xl mb-4 bg-ctp-mantle text-ctp-subtext text-sm animate-pulse-subtle">
          Connecté. En attente qu'un QR soit scanné...
        </div>
        <button onclick="disconnectWS(); goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
