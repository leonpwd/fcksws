<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FckSWS - QR Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ctp: {
              base: '#eff1f5',
              mantle: '#e6e9ef',
              crust: '#dce0e8',
              text: '#4c4f69',
              subtext: '#5c5f77',
              lavender: '#7287fd',
              blue: '#1e66f5',
              sapphire: '#209fb5',
              sky: '#04a5e5',
              teal: '#179299',
              green: '#40a02b',
              mauve: '#8839ef',
              pink: '#ea76cb',
              rosewater: '#dc8a78'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #e6e9ef 0%, #dce0e8 100%);
    }
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    .animate-pulse-subtle {
      animation: pulse-subtle 2s ease-in-out infinite;
    }
    #qrCanvas {
      display: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <!-- Card Container -->
    <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl shadow-ctp-mantle/20 p-8 animate-fade-in">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-ctp-mauve to-ctp-pink bg-clip-text text-transparent mb-2">
          🎯 FckSWS
        </h1>
      </div>
      
      <!-- Step 1: Mode selection -->
      <div id="step1" class="step active">
        <h2 class="text-xl font-semibold text-ctp-text mb-6 text-center">Choisir un mode</h2>
        <div class="space-y-3">
          <button onclick="selectMode('scanner')" class="w-full bg-ctp-text hover:bg-ctp-subtext text-white font-medium py-5 rounded-xl transition-all duration-200 flex items-center justify-center gap-3">
            <span class="text-2xl">📷</span>
            <span>Scanner un QR code</span>
          </button>
          <button onclick="selectMode('receiver')" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-5 rounded-xl transition-all duration-200 flex items-center justify-center gap-3 border-2 border-ctp-text/20">
            <span class="text-2xl">📱</span>
            <span>Recevoir le QR code</span>
          </button>
        </div>
      </div>
      
      <!-- Step 2: Create room (for scanner) -->
      <div id="step2-create" class="step">
        <h2 class="text-xl font-semibold text-ctp-text mb-4 text-center">Créer une room</h2>
        <div class="mb-6">
          <label class="block text-ctp-subtext text-sm font-medium mb-2">Nom de votre room</label>
          <input type="text" id="roomNameInput" placeholder="Ex: Amphi A, CM Maths..." 
            class="w-full px-4 py-3 rounded-xl border-2 border-ctp-crust bg-white text-ctp-text text-base focus:outline-none focus:border-ctp-text transition-colors"
            maxlength="30" />
        </div>
        <button onclick="createRoom()" class="w-full bg-ctp-text hover:bg-ctp-subtext text-white font-medium py-3 rounded-xl transition-all duration-200 mb-3">
          Créer et scanner
        </button>
        <button onclick="goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
      
      <!-- Step 2: Join room (for receiver) -->
      <div id="step2-join" class="step">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold text-ctp-text">Rooms disponibles</h2>
          <span class="text-xs text-ctp-subtext flex items-center gap-1">
            <span class="inline-block w-2 h-2 bg-ctp-green rounded-full animate-pulse"></span>
            Auto-refresh
          </span>
        </div>
        <div id="roomsList" class="space-y-2 mb-4 max-h-96 overflow-y-auto">
          <div class="text-center py-8 text-ctp-subtext text-sm">
            Chargement...
          </div>
        </div>
        <button onclick="refreshRooms()" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200 mb-3">
          🔄 Actualiser maintenant
        </button>
        <button onclick="goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
      
      <!-- Step 3: Scanner mode -->
      <div id="step3-scanner" class="step">
        <div class="mb-4 bg-ctp-mantle/50 rounded-xl p-4 text-center">
          <p class="text-ctp-subtext text-sm mb-1">Room active</p>
          <p id="roomName" class="text-2xl font-bold text-ctp-text"></p>
        </div>
        
        <h2 class="text-lg font-semibold text-ctp-text mb-3 text-center flex items-center justify-center gap-2">
          <span class="text-xl">📷</span> Scannez le QR code
        </h2>
        <div class="relative mb-4">
          <video id="video" autoplay playsinline class="w-full rounded-2xl shadow-lg" style="display: none;"></video>
          <canvas id="overlayCanvas" class="absolute top-0 left-0 w-full h-full rounded-2xl pointer-events-none" style="display: none;"></canvas>
          
          <!-- Zoom controls -->
          <div id="zoomControls" class="absolute bottom-4 right-4 flex gap-2" style="display: none;">
            <button onclick="adjustZoom(-1)" class="bg-black/50 hover:bg-black/70 text-white w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 text-xl font-bold">
              −
            </button>
            <div class="bg-black/50 text-white px-3 py-2 rounded-full backdrop-blur-sm flex items-center justify-center min-w-[60px]">
              <span id="zoomLevel" class="text-sm font-mono">1.0x</span>
            </div>
            <button onclick="adjustZoom(1)" class="bg-black/50 hover:bg-black/70 text-white w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 text-xl font-bold">
              +
            </button>
          </div>
        </div>
        <canvas id="qrCanvas" style="display: none;"></canvas>
        <div id="scanStatus" class="text-center py-3 px-4 rounded-xl mb-4 bg-ctp-mantle text-ctp-subtext text-sm animate-pulse-subtle">
          En attente de QR code...
        </div>
        <button onclick="stopScanner(); goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
      
      <!-- Step 3: Receiver mode -->
      <div id="step3-receiver" class="step">
        <div class="mb-4 bg-ctp-mantle/50 rounded-xl p-4 text-center">
          <p class="text-ctp-subtext text-sm mb-1">Room connectée</p>
          <p id="roomNameDisplay" class="text-2xl font-bold text-ctp-text"></p>
        </div>
        
        <h2 id="receiverTitle" class="text-lg font-semibold text-ctp-text mb-3 text-center flex items-center justify-center gap-2">
          <span class="text-xl">⏳</span> En attente du QR code
        </h2>
        <div id="qrDisplay" class="bg-white rounded-2xl p-6 mb-4 shadow-inner hidden flex items-center justify-center min-h-[300px]"></div>
        <div id="receiveStatus" class="text-center py-3 px-4 rounded-xl mb-4 bg-ctp-mantle text-ctp-subtext text-sm animate-pulse-subtle">
          Connecté. En attente qu'un QR soit scanné...
        </div>
        <button onclick="disconnectWS(); goBack(1)" class="w-full bg-ctp-mantle hover:bg-ctp-crust text-ctp-text font-medium py-3 rounded-xl transition-all duration-200">
          ← Retour
        </button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
